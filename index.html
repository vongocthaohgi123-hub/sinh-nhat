<style>
    body {
        background-color: #000000; /* Đen hoàn toàn */
        color: #ffffff; /* Chữ trắng */
        font-family: 'Segoe UI', sans-serif;
        margin: 0;
        height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        text-align: center;
        user-select: none; /* Không cho bôi đen chữ khi bấm màn hình */
    }
    .container {
        padding: 20px;
        width: 100%;
        max-width: 400px;
    }
    .hidden {
        display: none !important; /* Dùng để ẩn các màn hình chưa dùng tới */
    }
    .btn {
        background-color: #ffffff;
        color: #000000;
        border: none;
        padding: 10px 25px;
        font-size: 16px;
        font-weight: bold;
        margin: 10px;
        border-radius: 5px;
        cursor: pointer;
    }
    .input-box {
        padding: 10px;
        font-size: 16px;
        border-radius: 5px;
        border: 2px solid #ffffff;
        background: transparent;
        color: #ffffff;
        text-align: center;
        margin-bottom: 15px;
        width: 80%;
        outline: none;
    }
    h1, h2 {
        line-height: 1.4;
    }
</style>

<div class="container">
    <div id="screen-hello" onclick="goToQuestion1()">
        <h1>xin chào</h1>
        <p style="color: #666; font-size: 14px;">(Chạm vào màn hình để tiếp tục)</p>
    </div>

    <div id="screen-ask" class="hidden">
        <h2>Bạn có muốn tham gia trò chơi của mình không?</h2>
        <button class="btn" onclick="chooseJoin('yes')">Có</button>
        <button class="btn" onclick="chooseJoin('no')">Không</button>
    </div>

    <div id="screen-sad" class="hidden">
        <h1 style="font-size: 60px;">😭</h1>
        <h2>Bạn có muốn thoát ra không?</h2>
        <button class="btn" onclick="alert('Hãy tắt tab trình duyệt để thoát nhé!')">Thoát</button>
        <button class="btn" onclick="backToAsk()">Quay lại chơi</button>
    </div>

    <div id="screen-input-name" class="hidden">
        <h2>Hãy nhập tên của bạn</h2>
        <input type="text" id="player-name" class="input-box" placeholder="Nhập tên ở đây..."><br>
        <button class="btn" onclick="saveName()">Tiếp tục</button>
    </div>
</div>
<script>
    // 1. Bấm vào màn hình "xin chào" để qua câu hỏi
    function goToQuestion1() {
        document.getElementById('screen-hello').classList.add('hidden');
        document.getElementById('screen-ask').classList.remove('hidden');
    }

    // 2. Xử lý khi chọn Có hoặc Không
    function chooseJoin(answer) {
        if (answer === 'no') {
            // Hiện màn hình khóc
            document.getElementById('screen-ask').classList.add('hidden');
            document.getElementById('screen-sad').classList.remove('hidden');
        } else {
            // Hiện màn hình nhập tên
            document.getElementById('screen-ask').classList.add('hidden');
            document.getElementById('screen-input-name').classList.remove('hidden');
        }
    }

    // 2.5. Quay lại nếu lỡ bấm Không nhưng muốn chơi tiếp
    function backToAsk() {
        document.getElementById('screen-sad').classList.add('hidden');
        document.getElementById('screen-ask').classList.remove('hidden');
    }

    // 3. Lưu tên người chơi khi bấm Tiếp tục
    let nameUser = "";
    function saveName() {
        let inputVal = document.getElementById('player-name').value.trim();
        if (inputVal === "") {
            alert("Bạn chưa nhập tên kìa!");
        } else {
            nameUser = inputVal;
            alert("Hế lô " + nameUser + "! Chuẩn bị sang Bước tiếp theo nha.");
            // Chỗ này lát nữa chúng mình sẽ viết code cho Bước 2 vào đây
        }
    }
</script>
