<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Món Quà Bí Mật 🎉</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #ffe6e6;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow-x: hidden;
        }
        .container {
            background: white;
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            text-align: center;
            max-width: 450px;
            width: 90%;
            position: relative;
        }
        h2 { color: #ff4d6d; margin-bottom: 20px; font-size: 22px; }
        p { color: #555; margin-bottom: 20px; font-size: 16px; line-height: 1.5; }
        input[type="text"], input[type="number"] {
            width: 100%;
            padding: 12px;
            border: 2px solid #ffb3c1;
            border-radius: 10px;
            margin-bottom: 20px;
            font-size: 16px;
            outline: none;
            text-align: center;
        }
        button {
            background: #ff4d6d;
            color: white;
            border: none;
            padding: 12px 25px;
            font-size: 16px;
            border-radius: 10px;
            cursor: pointer;
            transition: 0.3s;
            font-weight: bold;
        }
        button:hover { background: #ff758f; }
        .btn-group { display: flex; gap: 10px; justify-content: center; }
        .hidden { display: none !important; }

        /* --- VẼ CHIBI BẰNG CSS --- */
        .chibi-container {
            width: 150px;
            height: 180px;
            margin: 0 auto 20px;
            position: relative;
        }
        .hair-back {
            width: 100px;
            height: 100px;
            background: #4a3728;
            border-radius: 30px 30px 10px 10px;
            position: absolute;
            top: 15px;
            left: 25px;
        }
        .head {
            width: 90px;
            height: 80px;
            background: #ffd8cc;
            border-radius: 40px;
            position: absolute;
            top: 20px;
            left: 30px;
            z-index: 2;
        }
        .hair-front {
            width: 96px;
            height: 40px;
            background: #4a3728;
            border-radius: 40px 40px 0 0;
            position: absolute;
            top: 15px;
            left: 27px;
            z-index: 3;
        }
        .hair-side-l, .hair-side-r {
            width: 15px;
            height: 65px;
            background: #4a3728;
            position: absolute;
            top: 30px;
            z-index: 3;
            border-radius: 10px;
        }
        .hair-side-l { left: 23px; }
        .hair-side-r { right: 23px; }
        .eye {
            width: 14px;
            height: 14px;
            background: #0077b6; /* Mắt xanh lam */
            border-radius: 50%;
            position: absolute;
            top: 40px;
            z-index: 4;
            transition: 0.2s;
        }
        .eye.left { left: 20px; }
        .eye.right { right: 20px; }
        .mouth {
            width: 16px;
            height: 8px;
            background: #ff4d6d;
            border-radius: 0 0 10px 10px;
            position: absolute;
            bottom: 15px;
            left: 37px;
            z-index: 4;
            transition: 0.2s;
        }
        .body-chibi {
            width: 50px;
            height: 60px;
            background: white; /* Áo phông trắng */
            border: 1px solid #ddd;
            border-radius: 20px 20px 5px 5px;
            position: absolute;
            top: 95px;
            left: 50px;
            z-index: 1;
        }
        .arm-l {
            width: 12px;
            height: 35px;
            background: white;
            border: 1px solid #ddd;
            border-radius: 10px;
            position: absolute;
            top: 98px;
            left: 38px;
            transform-origin: top center;
            transform: rotate(20px);
        }
        .arm-r-hello {
            width: 12px;
            height: 35px;
            background: white;
            border: 1px solid #ddd;
            border-radius: 10px;
            position: absolute;
            top: 98px;
            right: 38px;
            transform-origin: top center;
            transform: rotate(-140deg); /* Giơ tay Hello */
            animation: wave 1s infinite alternate;
        }
        @keyframes wave {
            0% { transform: rotate(-130deg); }
            100% { transform: rotate(-150deg); }
        }

        /* --- BIỂU CẢM CHIBI --- */
        .sad .eye {
            height: 4px;
            border-radius: 2px;
            background: #4a3728;
            top: 45px;
        }
        .sad .mouth {
            height: 6px;
            border-radius: 10px 10px 0 0;
            bottom: 18px;
        }
        .happy .eye {
            height: 4px;
            border-radius: 10px 10px 0 0;
            background: transparent;
            border-top: 4px solid #4a3728;
            top: 45px;
        }
        .happy .mouth {
            height: 12px;
            border-radius: 50%;
        }

        /* --- PHONG THƯ --- */
        .envelope {
            width: 120px;
            height: 90px;
            background: #ffb3c1;
            margin: 30px auto;
            position: relative;
            cursor: pointer;
            border-radius: 0 0 10px 10px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }
        .envelope::before {
            content: "";
            position: absolute;
            top: -45px; left: 0;
            border-width: 0 60px 45px 60px;
            border-style: solid;
            border-color: transparent transparent #ffb3c1 transparent;
        }
        .heart-icon {
            position: absolute;
            top: 30px; left: 45px;
            font-size: 30px;
            color: #ff4d6d;
        }
    </style>
</head>
<body>

<div class="container">
    <!-- GIAI ĐOẠN 1: LÁ THƯ -->
    <div id="part-envelope">
        <h2>Bạn có 1 thư mới! ✉️</h2>
        <p>Bấm vào lá thư dưới đây để mở món quà bí mật nhé.</p>
        <div class="envelope" onclick="startQuiz()">
            <div class="heart-icon">❤️</div>
        </div>
    </div>

    <!-- GIAI ĐOẠN 2: GIẢI TOÁN -->
    <div id="part-quiz" class="hidden">
        <h2 id="quiz-title">Câu hỏi thử thách</h2>
        <p id="quiz-question"></p>
        <input type="number" id="quiz-answer" placeholder="Nhập đáp án tại đây...">
        <br>
        <button onclick="checkAnswer()">Trả lời</button>
    </div>

    <!-- GIAI ĐOẠN 3: CÔ GÁI XUẤT HIỆN HỎI THOẠI -->
    <div id="part-story" class="hidden">
        <div id="chibi-character" class="chibi-container">
            <div class="hair-back"></div>
            <div class="hair-front"></div>
            <div class="hair-side-l"></div>
            <div class="hair-side-r"></div>
            <div class="head">
                <div class="eye left"></div>
                <div class="eye right"></div>
                <div class="mouth"></div>
            </div>
            <div class="body-chibi"></div>
            <div class="arm-l"></div>
            <div class="arm-r-hello"></div>
        </div>

        <p id="story-text"></p>
        
        <div id="story-buttons" class="btn-group"></div>
    </div>
</div>

<script>
    // Danh sách 4 câu toán đầu + 1 câu đặc biệt mật mã
    const quizData = [
        { q: "Câu 1: 15 + 27 = ?", a: 42 },
        { q: "Câu 2: 120 - 45 = ?", a: 75 },
        { q: "Câu 3: 8 x 9 = ?", a: 72 },
        { q: "Câu 4: 150 : 5 = ?", a: 30 },
        { q: "🔑 MẬT MÃ ĐẶC BIỆT: Nhập ngày tháng năm sinh của bạn (Ví dụ viết liền: 712009)", a: 712009 }
    ];

    let currentQuestionIndex = 0;

    function startQuiz() {
        document.getElementById('part-envelope').classList.add('hidden');
        document.getElementById('part-quiz').classList.remove('hidden');
        showQuestion();
    }

    function showQuestion() {
        if (currentQuestionIndex < quizData.length) {
            document.getElementById('quiz-question').innerText = quizData[currentQuestionIndex].q;
            document.getElementById('quiz-answer').value = "";
        }
    }

    function checkAnswer() {
        let userAnswer = parseInt(document.getElementById('quiz-answer').value);
        if (userAnswer === quizData[currentQuestionIndex].a) {
            currentQuestionIndex++;
            if (currentQuestionIndex < quizData.length) {
                showQuestion();
            } else {
                // Giải xong hết, chuyển sang cốt truyện cô gái
                document.getElementById('part-quiz').classList.add('hidden');
                document.getElementById('part-story').classList.remove('hidden');
                step1();
            }
        } else {
            alert("Sai rồi nè, tính toán lại chút nha! cố lên!");
        }
    }

    // --- CỐT TRUYỆN CÔ GÁI ---
    let character = document.getElementById('chibi-character');
    let text = document.getElementById('story-text');
    let btnGroup = document.getElementById('story-buttons');

    function step1() {
        text.innerText = "Bạn biết hôm nay là ngày gì không?";
        btnGroup.innerHTML = `
            <button onclick="step2Wrong()">Tui không nhớ</button>
            <button onclick="step2Right()">Ngày 7/1</button>
        `;
    }

    function step2Wrong() {
        // Nhấn không nhớ vẫn dẫn về câu 2 đúng
        step2Right();
    }

    function step2Right() {
        text.innerText = "Đúng rồi, hôm nay là sinh nhật của bạn đó, bạn thấy có vui không?";
        btnGroup.innerHTML = `
            <button onclick="step3No()">Không</button>
            <button onclick="step3Yes()">Có</button>
        `;
    }

    function step3No() {
        character.className = "chibi-container sad"; // Cô gái buồn
        text.innerText = "Ồ, đừng buồn nhé vì đã có mình bên cạnh bạn nè ❤️";
        btnGroup.innerHTML = `<button onclick="finalStep()">Tiếp tục</button>`;
    }

    function step3Yes() {
        character.className = "chibi-container happy"; // Cô gái híp mắt cười
        text.innerText = "Hihi, bạn vui là mình cũng vui theo đó (cô gái híp mắt cười)";
        btnGroup.innerHTML = `<button onclick="finalStep()">Tiếp tục</button>`;
    }

    function finalStep() {
        character.className = "chibi-container happy";
        text.style.fontSize = "18px";
        text.style.color = "#ff4d6d";
        text.style.fontWeight = "bold";
        text.innerText = "Chúc bạn sinh nhật vui vẻ, càng ngày càng học giỏi, hạnh phúc và đạt nhiều điều mình mong nha ^^ 🎉🎂🎈";
        btnGroup.innerHTML = `<button onclick="location.reload()">Chơi lại</button>`;
    }
</script>

</body>
</html>
